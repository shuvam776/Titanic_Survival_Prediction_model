<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Titanic Survival Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.25);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #0f172a;
        }

        .subtitle {
            text-align: center;
            color: gray;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        select {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
        }

        small {
            margin-top: 5px;
            color: gray;
        }

        .btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            background: rgba(0,255,0);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn:hover {
            background: rgb(0,150,0);
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            background: #f1f5f9;
        }

        @media(max-width:700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚢 Titanic Survival Predictor</h1>

    <p class="subtitle">
        Predict whether a passenger would survive the Titanic disaster.
    </p>

    <form method="POST">

        <div class="grid">

            <div class="field">
                <label>Passenger Class</label>
                <select name="pclass">
                    <option value="1">1st Class (Luxury)</option>
                    <option value="2">2nd Class</option>
                    <option value="3">3rd Class</option>
                </select>
            </div>

            <div class="field">
                <label>Age</label>
                <input
                    type="number"
                    name="age"
                    min="0"
                    max="80"
                    placeholder="Example: 25"
                    required>
            </div>

            <div class="field">
                <label>Siblings / Spouse</label>
                <input
                    type="number"
                    name="sibsp"
                    min="0"
                    max="8"
                    placeholder="Example: 0"
                    required>
            </div>

            <div class="field">
                <label>Parents / Children</label>
                <input
                    type="number"
                    name="parch"
                    min="0"
                    max="6"
                    placeholder="Example: 0"
                    required>
            </div>

            <div class="field">
                <label>Fare (£)</label>
                <input
                    type="number"
                    name="fare"
                    step="0.01"
                    min="0"
                    max="600"
                    placeholder="Example: 72.50"
                    required>
                <small>Typical range: £7 - £250</small>
            </div>

            <div class="field">
                <label>Gender</label>
                <select name="sex">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="field">
                <label>Embarked</label>
                <select name="embarked">
                    <option value="S">Southampton</option>
                    <option value="C">Cherbourg</option>
                    <option value="Q">Queenstown</option>
                </select>
            </div>

            <div class="field">
                <label>Title</label>
                <select name="title">
                    <option value="Mr">Mr (Adult Male)</option>
                    <option value="Mrs">Mrs (Married Female)</option>
                    <option value="Miss">Miss (Unmarried Female)</option>
                    <option value="Rare">Rare / Other</option>
                </select>
            </div>

        </div>

        <button class="btn" type="submit">
            Predict Survival
        </button>

    </form>

    {% if prediction %}
        <div class="result">
            {{ prediction }}
        </div>
    {% endif %}

</div>
<script>
if (window.history.replaceState) {
    window.history.replaceState(null, null, window.location.href);
}
</script>
</body>
</html>
